name: Publish AMP Hermes Agent image

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - .github/workflows/publish-hermes-amp-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/cjguirao/amp-hermes-agent

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/CJGuirao/AMP-Templates
            org.opencontainers.image.description=AMP-compatible Hermes Agent gateway and dashboard bootstrap image
